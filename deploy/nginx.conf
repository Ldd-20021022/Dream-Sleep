limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

upstream backend { server backend:8000; keepalive 32; }
upstream chronic_backend { server 172.17.0.1:8002; keepalive 16; }

server {
    listen 80;
    server_name p1.ansycare.com api1.ansycare.com app1.ansycare.com www.p1.ansycare.com;
    client_max_body_size 10m;
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /docs { proxy_pass http://backend/docs; }
    location /openapi.json { proxy_pass http://backend/openapi.json; }
    location /health { proxy_pass http://backend/health; }
    location / { proxy_pass http://backend/; proxy_http_version 1.1; proxy_set_header Host $host; }
}

server {
    listen 80;
    server_name api1.asycare.cn;
    location / { return 301 /docs; }
    location /api/ { proxy_pass http://chronic_backend/api/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /docs { proxy_pass http://chronic_backend/docs; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://chronic_backend/openapi.json; proxy_set_header Host $host; }
}

server {
    listen 80;
    server_name p1.asycare.cn;
    location /api/ { proxy_pass http://chronic_backend/api/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /ws/ { proxy_pass http://chronic_backend/ws/; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    location /docs { proxy_pass http://chronic_backend/docs; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://chronic_backend/openapi.json; proxy_set_header Host $host; }
    location / { proxy_pass http://chronic_backend/; proxy_http_version 1.1; proxy_set_header Host $host; }
}

server {
    listen 80;
    server_name app1.asycare.cn;
    location /api/ { proxy_pass http://chronic_backend/api/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /ws/ { proxy_pass http://chronic_backend/ws/; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    location /docs { proxy_pass http://chronic_backend/docs; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://chronic_backend/openapi.json; proxy_set_header Host $host; }
    location / { proxy_pass http://chronic_backend/; proxy_http_version 1.1; proxy_set_header Host $host; }
}
