<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦眠 - 数据可视化看板</title>
<style>
:root{--bg:#0a0a14;--card:#13132a;--bd:#1e1e3a;--tx:#e0e0f0;--tx2:#8888aa;--ac:#6c63ff;--teal:#0ec9a6;--warn:#f39c12;--err:#e74c3c;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:var(--card);border-bottom:1px solid var(--bd)}
.logo{font-size:20px;font-weight:700}.logo span{background:linear-gradient(135deg,var(--ac),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:20px 32px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:20px}
.st-num{font-size:40px;font-weight:700}.st-label{font-size:13px;color:var(--tx2);margin-top:4px}
.st-sub{font-size:12px;color:var(--tx2);margin-top:2px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 32px 20px}
.row3{display:grid;grid-template-columns:2fr 1fr;gap:14px;padding:0 32px 20px}
.sec-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--tx2)}
canvas{width:100%;border-radius:8px}
.refresh-btn{background:var(--ac);color:#fff;border:none;padding:8px 20px;border-radius:20px;cursor:pointer;font-size:14px}
.legend{display:flex;gap:16px;margin-bottom:8px;font-size:12px;color:var(--tx2)}
.legend span{display:flex;align-items:center;gap:4px}.dot{width:8px;height:8px;border-radius:50%}
.loading{text-align:center;padding:40px;color:var(--tx2)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">梦眠 <span>数据可视化看板</span></div>
    <div style="display:flex;align-items:center;gap:16px">
      <span style="font-size:13px;color:var(--tx2)">{{now}}</span>
      <button class="refresh-btn" @click="loadAll">刷新</button>
    </div>
  </div>

  <div v-if="loading" class="loading">加载中...</div>
  <template v-else>
    <!-- Overview Cards -->
    <div class="grid">
      <div class="card"><div class="st-num" style="color:var(--ac)">{{ov.users?.total||0}}</div><div class="st-label">总用户</div><div class="st-sub">今日 +{{ov.users?.today||0}} · 付费 {{ov.users?.premium||0}}</div></div>
      <div class="card"><div class="st-num" style="color:var(--teal)">{{ov.sleep?.total_records||0}}</div><div class="st-label">总睡眠记录</div><div class="st-sub">今日 +{{ov.sleep?.today||0}} · 均分 {{ov.sleep?.avg_score||0}}</div></div>
      <div class="card"><div class="st-num" style="color:var(--warn)">{{ov.engagement?.total_chats||0}}</div><div class="st-label">AI 对话</div><div class="st-sub">活跃计划 {{ov.engagement?.active_plans||0}} · 动态 {{ov.engagement?.total_posts||0}}</div></div>
      <div class="card"><div class="st-num">{{ov.engagement?.total_plans||0}}</div><div class="st-label">改善计划</div><div class="st-sub">活跃 {{ov.engagement?.active_plans||0}} 个</div></div>
    </div>

    <!-- Charts Row 1 -->
    <div class="row2">
      <div class="card">
        <div class="sec-title">📈 用户增长趋势 ({{growthDays}}天)</div>
        <div class="legend"><span><span class="dot" style="background:var(--ac)"></span>每日新增</span><span><span class="dot" style="background:var(--teal)"></span>累计用户</span></div>
        <canvas ref="growthCh" width="700" height="280"></canvas>
      </div>
      <div class="card">
        <div class="sec-title">📊 睡眠评分分布 (7天)</div>
        <canvas ref="distCh" width="400" height="280"></canvas>
      </div>
    </div>

    <!-- Charts Row 2 -->
    <div class="row3">
      <div class="card">
        <div class="sec-title">🗓 活动热力图 ({{heatDays}}天)</div>
        <canvas ref="heatCh" width="700" height="200"></canvas>
      </div>
      <div class="card">
        <div class="sec-title">🤖 AI 使用统计 (7天)</div>
        <canvas ref="aiCh" width="360" height="280"></canvas>
      </div>
    </div>
  </template>
</div>

<script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
<script>
const {createApp,ref,reactive,onMounted,nextTick} = Vue
createApp({setup(){
const loading=ref(true);const now=ref(new Date().toLocaleString());const ov=ref({})
const growthDays=ref(30);const heatDays=ref(60)
const growthCh=ref(null);const distCh=ref(null);const heatCh=ref(null);const aiCh=ref(null)

async function api(path){
  const t=localStorage.getItem('admin_token');if(!t)return null
  const r=await fetch('/api/v1/admin'+path,{headers:{'Authorization':'Bearer '+t}})
  return r.ok?r.json():null
}

function drawGrowth(data){
  const c=growthCh.value;if(!c||!data)return
  const ctx=c.getContext('2d'),w=c.width,h=c.height
  ctx.clearRect(0,0,w,h)
  const daily=data.daily||[],cum=data.cumulative||[]
  if(!daily.length)return
  const mh=h-40,step=(w-60)/Math.max(daily.length-1,1)
  const maxC=Math.max(...cum.map(x=>x.count),1)
  // Bars
  daily.forEach((d,i)=>{
    const x=40+i*step,bh=(d.count/Math.max(...daily.map(x=>x.count),1))*mh*0.6
    ctx.fillStyle='rgba(108,99,255,0.6)';ctx.fillRect(x,20+mh-bh,Math.max(2,step-2),bh)
  })
  // Line
  ctx.strokeStyle='#0ec9a6';ctx.lineWidth=2;ctx.beginPath()
  cum.forEach((d,i)=>{const x=40+i*step,y=20+mh-(d.count/maxC)*mh;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke()
  // Labels
  ctx.fillStyle='#8888aa';ctx.font='10px sans-serif';ctx.textAlign='center'
  for(let i=0;i<daily.length;i+=Math.ceil(daily.length/8))ctx.fillText(daily[i].date.slice(5),40+i*step,h-5)
}

function drawDist(data){
  const c=distCh.value;if(!c||!data)return
  const ctx=c.getContext('2d'),w=c.width,h=c.height,cx=w/2-20,cy=h/2,r=Math.min(cx,cy)-10
  ctx.clearRect(0,0,w,h)
  const dist=data.distribution||[]
  if(!dist.length)return
  const total=dist.reduce((s,x)=>s+x.count,0)||1
  const colors=['#e74c3c','#f39c12','#f1c40f','#2ecc71','#0ec9a6']
  let angle=-Math.PI/2
  dist.forEach((d,i)=>{
    const slice=(d.count/total)*Math.PI*2
    ctx.fillStyle=colors[i];ctx.beginPath()
    ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();ctx.fill()
    // Label
    const mid=angle+slice/2,lx=cx+Math.cos(mid)*(r+30),ly=cy+Math.sin(mid)*(r+30)
    ctx.fillStyle='#e0e0f0';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText(d.range, lx, ly)
    ctx.fillText(d.count+'次', lx, ly+14)
    angle+=slice
  })
}

function drawHeatmap(data){
  const c=heatCh.value;if(!c||!data)return
  const ctx=c.getContext('2d'),w=c.width,h=c.height
  ctx.clearRect(0,0,w,h)
  const hm=data.heatmap||[]
  if(!hm.length)return
  const cols=Math.ceil(hm.length/7),cw=(w-60)/cols,ch=(h-30)/7,colors=['#13132a','#1a1a4a','#3a2a6a','#5a4a8a','#6c63ff']
  hm.forEach((d,i)=>{
    const col=Math.floor(i/7),row=i%7,x=50+col*cw,y=8+row*ch
    ctx.fillStyle=colors[Math.min(d.level||0,4)];ctx.fillRect(x,y,cw-1,ch-1)
  })
  ctx.fillStyle='#8888aa';ctx.font='10px sans-serif';ctx.textAlign='left'
  for(let i=0;i<7;i++)ctx.fillText(['日','一','二','三','四','五','六'][(new Date().getDay()-i+7)%7],10,18+i*ch)
}

function drawAI(data){
  const c=aiCh.value;if(!c||!data)return
  const ctx=c.getContext('2d'),w=c.width,h=c.height
  ctx.clearRect(0,0,w,h)
  const daily=data.daily||[]
  if(!daily.length)return
  const mh=h-40,step=(w-50)/Math.max(daily.length-1,1),maxV=Math.max(...daily.map(x=>x.count),1)
  ctx.strokeStyle='#6c63ff';ctx.lineWidth=3;ctx.fillStyle='rgba(108,99,255,0.15)';ctx.beginPath()
  daily.forEach((d,i)=>{
    const x=30+i*step,y=20+mh-(d.count/maxV)*mh
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)
  })
  const lastX=30+(daily.length-1)*step
  ctx.lineTo(lastX,20+mh);ctx.lineTo(30,20+mh);ctx.closePath();ctx.fill()
  ctx.strokeStyle='#6c63ff';ctx.lineWidth=3;ctx.beginPath()
  daily.forEach((d,i)=>{const x=30+i*step,y=20+mh-(d.count/maxV)*mh;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke()
  // Points
  daily.forEach((d,i)=>{const x=30+i*step,y=20+mh-(d.count/maxV)*mh;ctx.fillStyle='#0ec9a6';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill()})
  ctx.fillStyle='#8888aa';ctx.font='10px sans-serif';ctx.textAlign='center'
  ctx.fillText('总AI消息: '+data.total_ai_messages+' · '+data.unique_sessions+' 个会话',w/2,h-10)
}

async function loadAll(){
  loading.value=true
  const [overview,growth,dist,heat,aiStats]=await Promise.all([
    api('/viz/overview'),api('/viz/user-growth?days='+growthDays.value),
    api('/viz/sleep-distribution?days=7'),api('/viz/activity-heatmap?days='+heatDays.value),
    api('/viz/ai-stats?days=7')
  ])
  ov.value=overview||{}
  await nextTick()
  drawGrowth(growth);drawDist(dist);drawHeatmap(heat);drawAI(aiStats)
  now.value=new Date().toLocaleString();loading.value=false
}

async function doLogin(){
  const r=await fetch('/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'admin',password:'admin123'})})
  if(r.ok){const d=await r.json();localStorage.setItem('admin_token',d.access_token);return true}
  return false
}

onMounted(async()=>{
  if(!localStorage.getItem('admin_token'))await doLogin()
  if(localStorage.getItem('admin_token'))loadAll()
  setInterval(()=>now.value=new Date().toLocaleString(),30000)
})

return{loading,now,ov,growthDays,heatDays,growthCh,distCh,heatCh,aiCh,loadAll}
}}).mount('#app')
</script>
</body>
</html>
