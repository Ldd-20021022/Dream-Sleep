version: "3.8"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mengmian-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://emr_user:liangdaoming@host.docker.internal:5432/sleep_manager
      SECRET_KEY: ${SECRET_KEY:-changeme}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/static:/app/static
    networks:
      - review_default
      - default
volumes: {}
networks:
  review_default:
    external: true
  default:
    driver: bridge
