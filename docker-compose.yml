version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: mengmian-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mengmian2026
      MYSQL_DATABASE: sleep_manager
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mengmian-api
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:mengmian2026@db:3306/sleep_manager
      SECRET_KEY: mengmian_production_secret_change_me
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/static:/app/static

volumes:
  mysql_data:
